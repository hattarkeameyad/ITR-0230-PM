<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table tag</title>
</head>

<body>
    <table border="1px" cellpadding="20px" cellspacing="0px">
        <tr>
            <th>Roll no</th>
            <th>Name</th>
            <th>Class</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Rohit</td>

        </tr>
        <tr>
            <td>1</td>
            <td>Rohit</td>
            <td>Second year</td>
        </tr>
        <tr>
            <td>2</td>
            <td>mohit</td>

        </tr>
        <tr>
            <td>3</td>

    <h2>Another table</h2>
    <table width="1280px" cellspacing="0px" border="1px" cellpadding="10px">
        <thead>
            <tr>
                <th>sr no</th>
                <th>item name</th>
                <th>qty </th>
                <th>amount</th>
                <th>sgst </th>
                <th>cgst</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td rowspan="2">Pencil</td>
                <td>10</td>
                <td>5</td>
                <td>1</td>
                <td>1</td>
            </tr>
            <tr>
                <td>2</td>
                <td>10</td>
                <td>34</td>
                <td bgcolor="red" colspan="2">2</td>

            </tr>
            <tr>
                <td>3</td>
                <td>scale</td>
                <td>4</td>
                <td>20</td>
                <td>5</td>
                <td>5</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>4</td>
                <td>sharpner</td>
                <td>20</td>
                <td>15</td>
                <td>2</td>
                <td>20</td>
            </tr>

</html>
