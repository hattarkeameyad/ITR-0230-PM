<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table layout</title>
</head>

<body>
    <table border="1" width="1521px" height="791px" cellspacing="0" cellpadding="100">
        <tr>
            <td colspan='4' bgcolor="yellow"> This is header</td>
        </tr>
        <tr>
            <td rowspan="2" bgcolor="red"> This is first sidebar</td>
            <td bgcolor="violet" rowspan="2" colspan="2">
                This is main body
            </td>
            <td bgcolor="orange" rowspan="2">this is sidebar 2</td>
        </tr>
        <tr></tr>
        <tr>

            <td bgcolor="orange" colspan="4">this is footer</td>
        </tr>

    </table>
</body>

</html>
