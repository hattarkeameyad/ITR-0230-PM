<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="logincard">
            <div class="logo">
                <img src="https://pasadena.edu/strategic-communications-and-marketing/guides-and-reference/brand/visual-style-guide/images/pcclogo.png" alt="">
            </div>
           
                <div class="txtgrp">
                    <label for="login" id="login">Login</label>
                    <input class="textbox" placeholder="Username/Emailid" type="text" name="" id="">
                    <input class="textbox" placeholder="Password" type="password" name="" id="">

                </div>
                <input id="btn_login" type="submit" value="Login">
            
        </div>
    </div>
</body>
</html>
